duration: 180ms !important; } } /* Respect reduced motion preferences */ @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; } } /* ========================================================================== FIX 1: ●●● ABOUT BUTTON — Proper button appearance The base `index.html` rule sets `#buttons03 li a { width: 100vw }` which makes the button stretch full-viewport-width at every breakpoint before the 768px override kicks in. We override width here so it always renders as a compact pill button matching the \"Message\" / \"Add Friend\" style. ========================================================================== */ /* Always-on compact size: kill the 100vw base width */ #buttons03 li a { display: inline-flex !important; align-items: center !important; justify-content: center !important; width: 2.75rem !important; min-width: 2.75rem !important; height: 1.875rem !important; line-height: 1 !important; padding: 0 !important; text-align: center !important; font-size: 0.75em !important; font-weight: 500 !important; border-radius: 0.25rem !important; /* Match gradient background from #buttons02 .button */ background: linear-gradient(145deg, #f4f0ec 0%, #e6e0da 100%) !important; color: var(--v2-ink, #3a3530) !important; border: 1px solid rgba(184, 177, 171, 0.8) !important; box-shadow: 0 1px 3px rgba(22, 22, 22, 0.07) !important; } /* Mobile breakpoint: taller touch target (mirrors #buttons02 mobile sizing) */ @media (max-width: 768px) { #buttons03 li a { width: 2.75rem !important; min-width: 44px !important; height: 2.75rem !important; min-height: 44px !important; border-radius: 0.5rem !important; font-size: 0.66rem !important; letter-spacing: 0.06em !important; /* Slightly more transparent on mobile to match the inline style override */ background: linear-gradient(145deg, rgba(244, 240, 236, 0.72) 0%, rgba(230, 224, 218, 0.9) 100%) !important; color: var(--v2-muted, #7a746e) !important; border: 1px solid rgba(184, 177, 171, 0.8) !important; box-shadow: 0 1px 4px rgba(22, 22, 22, 0.07) !important; } } /* Desktop (≥ 768px): compact height matching desktop #buttons02 li a (1.875rem) */ @media (min-width: 768px) { #buttons03 li a { width: 2.4rem !important; min-width: 2.4rem !important; height: 1.875rem !important; min-height: unset !important; border-radius: 0.25rem !important; background: linear-gradient(145deg, #f4f0ec 0%, #e6e0da 100%) !important; color: var(--v2-ink, #3a3530) !important; border: 1px solid rgba(184, 177, 171, 0.75) !important; box-shadow: 0 1px 3px rgba(22, 22, 22, 0.06) !important; letter-spacing: 0.06em !important; font-size: 0.66rem !important; } } /* ========================================================================== FIX 2: ABOUT PANEL LAYOUT — Constrain nested containers #container11 > .wrapper > .inner inherits --padding-horizontal which can push child container wrappers wider than the available space. We ensure #about-panel and its children (container08 / container09) are fully box-contained and never overflow the card. ========================================================================== */ /* The outer transparent wrapper already has padding via --padding-horizontal. The about-panel div must fill 100% of its parent without adding extra space. */ #about-panel { width: 100% !important; display: block !important; box-sizing: border-box !important; } /* Ensure both child containers sit flush inside #about-panel */ #about-panel > #container08, #about-panel > #container09 { width: 100% !important; max-width: 100% !important; box-sizing: border-box !important; /* Remove any auto-margins that could shift width calculations */ margin-left: 0 !important; margin-right: 0 !important; } /* The .wrapper divs inside container08/09 must also be fully contained */ #about-panel > #container08 > .wrapper, #about-panel > #container09 > .wrapper { width: 100% !important; max-width: 100% !important; box-sizing: border-box !important; } /* The .inner divs must not add extra horizontal padding that breaks layout */ #about-panel > #container08 > .wrapper > .inner, #about-panel > #container09 > .wrapper > .inner { box-sizing: border-box !important; width: 100% !important; max-width: 100% !important; } /* Tighten the outer container11 inner padding so the card sits cleanly */ #container11 > .wrapper > .inner { padding-left: 0 !important; padding-right: 0 !important; } /* ========================================================================== FIX: DOTS MENU — z-index stacking context over activity widget Root cause: every .container uses position: relative, which creates a stacking context. DOM siblings that appear AFTER #container03 (e.g. #container06 Spotify card, #container-lanyard Discord activity card) paint on top of it, burying the #dots-menu dropdown even though it has z-index: 9000 — because that value is scoped inside #container03's own stacking context. Fix: elevate #container03 above its siblings by giving it an explicit z-index. z-index: 10 is enough to beat any plain position:relative sibling and is far below the dots-menu's own 9000 (which stays internal). #dots-menu-wrapper also gets position: relative + z-index: 9999 so the dropdown itself escapes any inner stacking contexts within the column cell. ========================================================================== */ #container03 { position: relative; z-index: 10; } #dots-menu-wrapper { position: relative; z-index: 9999; } /* ========================================================================== DARK THEME - Cyberpunk Gothic Tagline: 闇而生かれて、星になる (\"born in darkness, becoming a star\") ========================================================================== */ [data-theme=\"dark\"] { /* ============================================================ DARK THEME DESIGN TOKENS ============================================================ */ --void: #050508; --deep: #0a0a12; --surface: #0f0f1a; --glass: rgba(15, 15, 26, 0.7); --border: rgba(140, 80, 255, 0.18); --border-cyan: rgba(0, 255, 220, 0.15); --purple: #8c50ff; --purple-dim: rgba(140, 80, 255, 0.6); --cyan: #00ffdc; --cyan-dim: rgba(0, 255, 220, 0.6); --pink: #ff3fa4; --text-primary: #e8e0ff; --text-secondary: rgba(200, 185, 255, 0.6); --text-muted: rgba(140, 120, 200, 0.4); --glow-purple: 0 0 30px rgba(140, 80, 255, 0.25); --glow-cyan: 0 0 30px rgba(0, 255, 220, 0.15); /* Override light theme vars */ --v2-bg: var(--void); --v2-bg-soft: var(--deep); --v2-card: var(--surface); --v2-surface: var(--deep); --v2-border: rgba(140, 80, 255, 0.25); --v2-ink: var(--text-primary); --v2-ink-strong: var(--text-primary); --v2-muted: var(--text-secondary); --v2-accent: var(--purple); --v2-accent-soft: rgba(140, 80, 255, 0.12); --v2-shadow: 0 20px 45px rgba(0, 0, 0, 0.5); } /* ============================================================ DARK THEME PAGE BACKGROUND ============================================================ */ [data-theme=\"dark\"] body { background: /* Speed lines overlay */ repeating-linear-gradient( 90deg, transparent 0, transparent 50%, rgba(140, 80, 255, 0.015) 50%, transparent 51% ), /* Layered radial gradients */ radial-gradient(ellipse 80% 60% at 20% 10%, rgba(140, 80, 255, 0.08) 0%, transparent 50%), radial-gradient(ellipse 70% 50% at 80% 90%, rgba(0, 255, 220, 0.05) 0%, transparent 45%), radial-gradient(ellipse 60% 40% at 90% 20%, rgba(255, 63, 164, 0.04) 0%, transparent 40%), radial-gradient(ellipse 100% 80% at 50% 100%, rgba(140, 80, 255, 0.06) 0%, transparent 55%), var(--void); background-size: 100px 100%, 100% 100%; } [data-theme=\"dark\"] body::before { background-image: /* Grid */ linear-gradient(rgba(140, 80, 255, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(140, 80, 255, 0.04) 1px, transparent 1px); background-size: 60px 60px; opacity: 1; z-index: 0; } /* Speed lines animation */ [data-theme=\"dark\"] body::after { content: \"\"; position: fixed; inset: 0; pointer-events: none; background: repeating-linear-gradient( 90deg, transparent 0, transparent 50%, rgba(140, 80, 255, 0.06) 50%, transparent 51% ); width: 1px; left: 15%; top: 0; bottom: 0; animation: speed-line-left 4s ease-in-out infinite; z-index: 1; } [data-theme=\"dark\"] body::after { animation-delay: -2s; left: 82%; } @keyframes speed-line-left { 0%, 100% { transform: scaleY(0.3); opacity: 0; } 20% { transform: scaleY(1); opacity: 1; } 80% { transform: scaleY(1); opacity: 1; } 100% { transform: scaleY(0.3); opacity: 0; } } /* ============================================================ DARK THEME MAIN CARD ============================================================ */ [data-theme=\"dark\"] #main { background: linear-gradient(180deg, rgba(15, 15, 26, 0.85) 0%, var(--surface) 100%); border-color: var(--border); box-shadow: 0 20px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px var(--border), inset 0 1px 0 rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); } /* Card shimmer effect */ [data-theme=\"dark\"] #main::before { content: \"\"; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient( 90deg, transparent 0%, rgba(140, 80, 255, 0.4) 20%, rgba(0, 255, 220, 0.3) 50%, rgba(140, 80, 255, 0.4) 80%, transparent 100% ); border-radius: inherit; pointer-events: none; } /* Corner accents */ [data-theme=\"dark\"] #main::after { content: \"\"; position: absolute; top: -1px; right: -1px; width: 20px; height: 20px; border-top: 2px solid var(--purple); border-right: 2px solid var(--purple); border-radius: 0 0.375rem 0 0; opacity: 0.6; } /* ============================================================ DARK THEME AVATAR RING ============================================================ */ [data-theme=\"dark\"] #image04 .frame { border: none !important; background: conic-gradient( from 0deg, var(--purple) 0deg, var(--cyan) 120deg, var(--pink) 240deg, var(--purple) 360deg ); padding: 4px; animation: avatar-ring 4s linear infinite; box-shad
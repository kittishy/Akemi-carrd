- generic [ref=e2]: "/* ========================================================================== CREAMY ANIMATION SYSTEM Smooth, buttery transitions using custom cubic-bezier easing functions. Optimized for both desktop and mobile performance. ========================================================================== */ /* Creamy easing presets */ :root { /* Smooth \"cream\" easing - starts slow, accelerates gently, eases out */ --ease-cream: cubic-bezier(0.34, 1.56, 0.64, 1); /* Soft ease-out for exits - gentle deceleration */ --ease-soft-out: cubic-bezier(0.25, 0.46, 0.45, 0.94); /* Balanced ease - natural feeling */ --ease-balanced: cubic-bezier(0.4, 0, 0.2, 1); /* Spring-like cream for interactive elements */ --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Duration constants - keeping them quick but smooth */ --duration-instant: 120ms; --duration-fast: 200ms; --duration-normal: 320ms; --duration-slow: 450ms; } /* Keep non-active sections fully hidden to avoid stray divider lines before/after JS state sync. */ #main > .inner > section:not(.active) { display: none !important; opacity: 0 !important; max-height: 0 !important; min-height: 0 !important; overflow: hidden !important; /* Creamy hide transition */ transition: opacity var(--duration-normal) var(--ease-soft-out), transform var(--duration-normal) var(--ease-soft-out), max-height var(--duration-slow) var(--ease-soft-out), min-height var(--duration-slow) var(--ease-soft-out); } #main > .inner > section.active { display: block !important; /* overflow-x: clip prevents horizontal overflow painting without creating a scroll container (unlike overflow-x: hidden which implicitly sets overflow-y: auto and would cause a scrollbar when #dots-menu extends downward past the section). */ overflow-x: clip; /* Creamy appear transition */ transition: opacity var(--duration-normal) var(--ease-cream), transform var(--duration-normal) var(--ease-cream); } /* Mobile: ensure panels don't overflow horizontally */ @media (max-width: 480px) { #container10, #container11 { overflow-x: hidden; } #container10 .wrapper, #container11 .wrapper { max-width: 100%; overflow-x: hidden; } } /* ========================================================================== TOGGLE PANEL ANIMATIONS - CREAMY SMOOTH TRANSITIONS Making both Message and About panels open/close smoothly ========================================================================== */ /* Creamy keyframe animation for panel open */ @keyframes panel-cream-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } /* Apply wrapper transitions for smooth open/close - matches Message panel timing exactly */ #container10 > .wrapper, #container11 > .wrapper { animation: panel-cream-in 320ms cubic-bezier(0.34, 1.56, 0.64, 1) both; transition: opacity var(--duration-normal) var(--ease-cream), transform var(--duration-normal) var(--ease-cream); } /* Ensure hidden panels don't show animation on initial render */ #container10[hidden] > .wrapper, #container11[hidden] > .wrapper { animation: none; opacity: 0; } /* About toggle panel: transparent wrapper like message-panel */ #container11 > .wrapper { background: transparent !important; } #container11 > .wrapper > .inner { padding: 0.3rem 0 0.42rem !important; } #container08 > .wrapper, #container09 > .wrapper { background: #f5f5f5 !important; border-color: #c7c7c7 !important; border-style: solid !important; box-shadow: none !important; } #container08 > .wrapper { border-width: 1px !important; border-bottom-width: 0 !important; border-top-left-radius: 0.45rem !important; border-top-right-radius: 0.45rem !important; } #container09 > .wrapper { border-width: 1px !important; border-top-width: 1px !important; border-top-color: #d8d8d8 !important; border-bottom-left-radius: 0.45rem !important; border-bottom-right-radius: 0.45rem !important; } #container08 > .wrapper > .inner { padding: 0.8rem 0.75rem 0.55rem !important; } #container09 > .wrapper > .inner { padding: 0.5rem 0.75rem 0.85rem !important; } #image01 .frame { width: 3.4rem !important; border-radius: 999px !important; box-shadow: none !important; } #text02 { text-align: left !important; font-size: 0.9rem !important; line-height: 1.35 !important; color: #6a6a6a !important; } #text02 strong { color: #4f4f4f !important; } #text05 { text-align: left !important; font-size: 0.86rem !important; line-height: 1.65 !important; color: #3f3f3f !important; } #text05 strong { color: #2f2f2f !important; } #text05 a { color: #b3b3b3 !important; text-decoration: underline; text-decoration-color: rgba(179, 179, 179, 0.35); text-underline-offset: 2px; } /* Desktop-only: improve hero name contrast over banner */ @media (min-width: 1025px) { #container02 #text01 { -webkit-text-stroke: 1.2px rgba(255, 255, 255, 0.95); paint-order: stroke fill; text-shadow: 0 0 2px rgba(255, 255, 255, 0.95), 0 1px 3px rgba(0, 0, 0, 0.35); } } #container10 > .wrapper { background: transparent !important; } #container10 > .wrapper > .inner { padding: 0.3rem 0 0.42rem !important; } #message-panel { border: 1px solid var(--v2-border, #b8b1ab); border-radius: 0.45rem; background: linear-gradient(180deg, #fbf9f7 0%, var(--v2-card, #f8f6f3) 100%); box-shadow: 0 8px 18px rgba(22, 22, 22, 0.08); padding: 0.78rem 0.75rem; /* Creamy transition for panel appearance */ transition: border-color var(--duration-normal) var(--ease-cream), box-shadow var(--duration-normal) var(--ease-cream), opacity var(--duration-normal) var(--ease-cream), transform var(--duration-normal) var(--ease-cream); } #text08 { margin-bottom: 0.55rem; color: var(--v2-ink, #2a2929); font-size: 0.78rem; line-height: 1.25; letter-spacing: 0.01em; } .message-form { display: grid; gap: 0.5rem; } .message-form input, .message-form textarea { width: 100%; border: 1px solid var(--v2-border, #b8b1ab); border-radius: 0.35rem; background: #ffffff; color: var(--v2-ink, #2a2929); font: inherit; font-size: 0.78rem; line-height: 1.35; padding: 0.56rem 0.62rem; min-height: 2.5rem; box-shadow: inset 0 1px 1px rgba(22, 22, 22, 0.04); /* Creamy transition for form interactions */ transition: border-color var(--duration-fast) var(--ease-cream), box-shadow var(--duration-fast) var(--ease-cream), background-color var(--duration-fast) var(--ease-cream), transform var(--duration-fast) var(--ease-soft-out); } .message-form input::placeholder, .message-form textarea::placeholder { color: var(--v2-muted, #726b66); opacity: 0.9; } .message-form input:focus, .message-form textarea:focus { outline: none; } .message-form input:focus-visible, .message-form textarea:focus-visible { border-color: var(--v2-accent, #8f8176); box-shadow: 0 0 0 2px rgba(143, 129, 118, 0.22), inset 0 1px 1px rgba(22, 22, 22, 0.04); } .message-form textarea { min-height: 6rem; resize: vertical; } .message-form .button { display: inline-flex; align-items: center; justify-content: center; width: 100%; border: 1px solid var(--v2-border, #b8b1ab); border-radius: 0.375rem; background: linear-gradient(145deg, #f1ece7 0%, #e3ddd8 100%); box-shadow: 0 2px 10px rgba(22, 22, 22, 0.08); color: var(--v2-ink, #2a2929); font: inherit; font-size: 0.76rem; font-weight: 600; letter-spacing: 0.01rem; line-height: 1.1; min-height: 2.75rem; padding: 0.5rem 0.7rem; cursor: pointer; /* Creamy button transition */ transition: transform var(--duration-fast) var(--ease-spring), box-shadow var(--duration-fast) var(--ease-cream), border-color var(--duration-fast) var(--ease-cream), filter var(--duration-fast) var(--ease-soft-out), background-color var(--duration-fast) var(--ease-soft-out); } .message-form .button:hover { transform: translateY(-2px); box-shadow: 0 8px 14px rgba(22, 22, 22, 0.12); } .message-form .button:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(22, 22, 22, 0.08); transition: transform var(--duration-instant) var(--ease-soft-out), box-shadow var(--duration-instant) var(--ease-soft-out); } .message-form .button:focus-visible { outline: none; border-color: var(--v2-accent, #8f8176); box-shadow: 0 0 0 2px rgba(143, 129, 118, 0.22), 0 6px 12px rgba(22, 22, 22, 0.1); } .message-form .button:disabled { opacity: 0.65; cursor: not-allowed; transform: none; } @media (max-width: 768px) { #container10 > .wrapper > .inner { padding: 0.24rem 0 0.36rem !important; } #container11 > .wrapper > .inner { padding: 0.24rem 0 0.36rem !important; } #message-panel { padding: 0.72rem 0.68rem; } #text08 { font-size: 0.8rem; margin-bottom: 0.5rem; } /* Ensure toggle button touch targets work well with tap */ #message-button, #about-button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; } } @media (max-width: 1024px) and (min-width: 481px) { #container10 > .wrapper > .inner { padding: 0.34rem 0.12rem 0.25rem !important; } #container11 > .wrapper > .inner { padding: 0.34rem 0.12rem 0.25rem !important; } #message-panel { padding: 0.82rem; border-radius: 0.5rem; } #text08 { font-size: 0.82rem; line-height: 1.35; } .message-form { gap: 0.5rem; } .message-form input, .message-form textarea, .message-form .button { min-height: 2.65rem; } .message-form input, .message-form textarea { font-size: 0.82rem; } .message-form textarea { min-height: 6.4rem; } .message-form .button { font-size: 0.8rem; } /* Ensure toggle buttons have responsive tap */ #message-button, #about-button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; } } .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; } @media (max-width: 480px) { #container08 > .wrapper > .inner { padding: 0.72rem 0.62rem 0.5rem !important; } #container09 > .wrapper > .inner { padding: 0.48rem 0.62rem 0.75rem !important; } #text02 { font-size: 0.86rem !important; } #text05 { font-size: 0.82rem !important; line-height: 1.58 !important; } #message-panel { padding: 0.72rem 0.64rem; } .message-form { gap: 0.52rem; } .message-form input, .message-form textarea, .message-form .button { min-height: 2.75rem; } .message-form input, .message-form textarea { font-size: 0.86rem; padding: 0.6rem 0.64rem; } .message-form textarea { min-height: 7rem; } .message-form .button { font-size: 0.84rem; } } /* Extra small screens: fix overflow */ @media (max-width: 360px) { #message-form input, #message-form textarea { font-size: 0.86rem; padding: 0.5rem 0.52rem; max-width: 100%; overflow-x: hidden; } .message-form .button { font-size: 0.8rem; padding-left: 0.5rem; padding-right: 0.5rem; } #message-panel { padding: 0.62rem 0.54rem; } } @media (hover: hover) and (pointer: fine) { .message-form input:hover, .message-form textarea:hover { border-color: color-mix(in srgb, var(--v2-border, #b8b1ab) 72%, var(--v2-accent, #8f8176) 28%); } } /* Force Add Friend button (#buttons02 .button.n01) to use #2a2a2a - Override gradient override */ #buttons02 .button.n01 { background-color: #2a2a2a !important; background: #2a2a2a !important; color: #fff !important; } #buttons02 .button.n01 svg { fill: #fff !important; } @media (hover: hover) { #buttons02 .button.n01:hover, #buttons02 .button.n01:focus-visible { background-color: #2a2a2a !important; background: #2a2a2a !important; } } /* Mobile: Ensure Add Friend button stays readable */ @media (max-width: 480px) { #buttons02 .button.n01 { font-size: 0.82rem; letter-spacing: 0.01em; } } /* Very small screens: prevent button text overflow */ @media (max-width: 360px) { #buttons02 .button.n01 { font-size: 0.76rem; padding-left: 0.5rem; padding-right: 0.5rem; } } /* ========================================================================== CREAMY BUTTON & INTERACTIVE TRANSITIONS Applied as overrides to base Carrd styles for buttery smoothness ========================================================================== */ /* Main nav buttons - silky smooth hover */ #buttons01 li a { transition: transform var(--duration-fast) var(--ease-spring), box-shadow var(--duration-fast) var(--ease-cream), background-color var(--duration-fast) var(--ease-balanced), color var(--duration-fast) var(--ease-balanced) !important; } #buttons01 li a:hover, #buttons01 li a:focus-visible { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(22, 22, 22, 0.12); } /* Action buttons - #buttons02 */ #buttons02 li a { transition: transform var(--duration-fast) var(--ease-spring), box-shadow var(--duration-fast) var(--ease-cream), background-color var(--duration-normal) var(--ease-balanced), border-color var(--duration-fast) var(--ease-cream), filter var(--duration-fast) var(--ease-soft-out) !important; } #buttons02 li a:hover, #buttons02 li a:focus-visible { transform: translateY(-2px); box-shadow: 0 10px 18px rgba(22, 22, 22, 0.14); } /* Message button - #buttons03 */ #buttons03 li a { transition: transform var(--duration-fast) var(--ease-spring), box-shadow var(--duration-fast) var(--ease-cream), background-color var(--duration-normal) var(--ease-balanced), border-color var(--duration-fast) var(--ease-cream) !important; } #buttons03 li a:hover, #buttons03 li a:focus-visible { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(22, 22, 22, 0.12); } /* Avatar image - smooth scale */ #image04 .frame img, #image01 .frame img { transition: transform var(--duration-normal) var(--ease-cream), filter var(--duration-fast) var(--ease-balanced) !important; } #image04 .frame:hover img, #image04 .frame:focus-within img, #image01 .frame:hover img, #image01 .frame:focus-within img { transform: scale(1); } /* Social icons - creamy fade */ .social-icon { height: .9em; width: auto; vertical-align: -.08em; margin-right: .25em; opacity: 0.55; filter: grayscale(1) brightness(0.45); transition: opacity var(--duration-fast) var(--ease-cream), filter var(--duration-fast) var(--ease-cream), transform var(--duration-fast) var(--ease-soft-out); } a:hover > .social-icon, a:focus-visible > .social-icon { opacity: 0.85; filter: grayscale(0.3) brightness(0.55); transform: scale(1.05); } /* Link hover - smooth color
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Message sent / 送信完了 | Akemi</title>
  <meta name="description" content="Your message has been sent successfully. / メッセージの送信が完了しました。" />
  <meta name="theme-color" content="#dcdcdb" />
  <link rel="icon" href="favicon.ico" sizes="16x16 32x32 48x48" />
  <link rel="icon" type="image/png" href="assets/images/favicon-32.png" sizes="32x32" />
  <link rel="apple-touch-icon" href="assets/images/favicon-48.png" />
  <link rel="canonical" href="https://akemi.vercel.app/success.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?display=swap&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400;1,500;1,600;1,700;1,900" rel="stylesheet" />
  <style>
    :root {
      --v2-bg: #dcdcdb;
      --v2-bg-soft: #f1f0ef;
      --v2-card: #f8f6f3;
      --v2-border: #b8b1ab;
      --v2-ink: #2a2929;
      --v2-ink-strong: #161616;
      --v2-muted: #726b66;
      --v2-accent: #8f8176;
      --v2-shadow: 0 20px 45px rgba(22, 22, 22, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Archivo", sans-serif;
      color: var(--v2-ink);
      background: radial-gradient(120% 110% at 6% 4%, #faf8f6 0%, transparent 48%),
        radial-gradient(125% 120% at 92% 2%, #e5e0db 0%, transparent 44%),
        linear-gradient(145deg, var(--v2-bg-soft) 0%, var(--v2-bg) 58%, #d2cec9 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      line-height: 1.5;
    }

    .success-shell {
      width: min(42rem, 100%);
      border: 1px solid var(--v2-border);
      border-radius: 0.5rem;
      background: linear-gradient(180deg, #fbf9f7 0%, var(--v2-card) 100%);
      box-shadow: var(--v2-shadow);
      padding: 1.2rem 1.05rem;
    }

    .success-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      border-radius: 999px;
      border: 1px solid var(--v2-border);
      background: #ede8e3;
      color: var(--v2-ink-strong);
      font-size: 1rem;
      margin-bottom: 0.55rem;
    }

    h1 {
      margin: 0;
      color: var(--v2-ink-strong);
      font-size: clamp(1.15rem, 2.1vw, 1.45rem);
      letter-spacing: 0.015em;
      line-height: 1.25;
    }

    p {
      margin: 0.6rem 0 1rem;
      font-size: clamp(0.84rem, 1.4vw, 0.92rem);
      color: var(--v2-muted);
      max-width: 44ch;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.55rem;
      padding: 0.55rem 0.9rem;
      border: 1px solid var(--v2-border);
      border-radius: 0.4rem;
      background: linear-gradient(145deg, #f1ece7 0%, #e3ddd8 100%);
      color: var(--v2-ink);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.01em;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 14px rgba(22, 22, 22, 0.12);
    }

    .button:focus-visible {
      outline: none;
      border-color: var(--v2-accent);
      box-shadow: 0 0 0 2px rgba(143, 129, 118, 0.22), 0 6px 12px rgba(22, 22, 22, 0.1);
    }

    .text-link {
      display: inline-flex;
      align-items: center;
      font-size: 0.8rem;
      color: var(--v2-muted);
      text-underline-offset: 2px;
    }

    .text-link:focus-visible {
      outline: 2px solid var(--v2-accent);
      outline-offset: 2px;
      border-radius: 0.2rem;
    }

    @media (max-width: 768px) {
      .success-shell {
        padding: 1rem 0.85rem;
      }
    }

    @media (max-width: 480px) {
      .success-shell {
        border-radius: 0.45rem;
      }

      .button {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="success-shell" aria-labelledby="success-title">
    <span class="success-mark" aria-hidden="true">✓</span>
    <h1 id="success-title">Message sent successfully. / 送信が完了しました。</h1>
    <p>
      Thank you for reaching out — your message was delivered and will be read soon. / ご連絡ありがとうございます。メッセージを受け取りました。確認後に目を通します。
    </p>
    <div class="actions">
      <a class="button" href="./#home">Back to homepage / ホームに戻る</a>
      <a class="text-link" href="./">Open main profile / プロフィールを開く</a>
    </div>
  </main>
</body>
</html>
